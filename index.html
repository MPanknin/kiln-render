<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KILN</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: #222;
    }

    canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }

    #error {
      color: #ff6b6b;
      background: #2a2a2a;
      padding: 20px;
      border-radius: 8px;
      max-width: 500px;
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1000;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>
  <canvas></canvas>
  <div id="error"></div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
